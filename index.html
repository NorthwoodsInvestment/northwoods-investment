<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NorthWoods"/>
<title>NorthWoods Investment</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#ffffff;color:#1a202c;font-family:'DM Mono','Courier New',monospace;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f7f8fa;}::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:2px;}
input,select,textarea{background:#f7f8fa!important;border:1px solid #e2e8f0!important;color:#1a202c!important;border-radius:4px;padding:8px 10px;font-family:'DM Mono',monospace;font-size:16px;width:100%;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:#00e5a0!important;}
select option{background:#ffffff;}
.tab-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:14px;letter-spacing:.15em;text-transform:uppercase;padding:12px 22px;color:#718096;border-bottom:2px solid transparent;transition:all .2s;}
.tab-btn.active{color:#00a67e;border-bottom-color:#00a67e;}.tab-btn:hover{color:#1a202c;}
.submit-btn{background:#00a67e;color:#ffffff;border:none;font-size:15px replaced,monospace;font-size:15px;font-weight:500;letter-spacing:.1em;transition:opacity .2s;}
.submit-btn:hover{opacity:.85;}
.cancel-btn{background:#edf2f7;color:#1a202c;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:15px;transition:background .2s;margin-right:8px;}
.cancel-btn:hover{background:#e2e8f0;}
.icon-btn{background:none;border:none;cursor:pointer;color:#718096;padding:4px 6px;border-radius:3px;font-size:13px;transition:color .2s;}
.icon-btn:hover{color:#1a202c;}.del-btn:hover{color:#ff4d6d!important;}
.stat-card{background:#f7f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:16px 18px;}
.trade-row:hover{background:#edf2f7;}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:13px;letter-spacing:.08em;}
.ghost-btn{background:none;border:1px solid #e2e8f0;color:#718096;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.1em;transition:all .2s;}
.ghost-btn:hover{color:#1a202c;border-color:#718096;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SK="northwoods-trades";
const DF={date:new Date().toISOString().split("T")[0],ticker:"",setup:"ORB",direction:"LONG",entry:"",exit:"",shares:"1",notes:""};
const f$=v=>{const n=parseFloat(v);return isNaN(n)?"$0.00":(n<0?"-$":"$")+Math.abs(n).toFixed(2);};
const fp=v=>{const n=parseFloat(v);return isNaN(n)?"0.00%":(n>=0?"+":"")+n.toFixed(2)+"%";};
function pnl(t){const e=parseFloat(t.entry),x=parseFloat(t.exit),s=parseFloat(t.shares)||1;if(isNaN(e)||isNaN(x))return 0;return t.direction==="LONG"?(x-e)*s:(e-x)*s;}
function pct(t){const e=parseFloat(t.entry),x=parseFloat(t.exit);if(isNaN(e)||isNaN(x)||e===0)return 0;return t.direction==="LONG"?((x-e)/e)*100:((e-x)/e)*100;}
function gm(d){return d?.slice(0,7);}
function sts(arr){
  if(!arr.length)return{pnl:0,wins:0,losses:0,winRate:0,avgWin:0,avgLoss:0,ratio:0};
  const ps=arr.map(pnl),ws=ps.filter(p=>p>0),ls=ps.filter(p=>p<0);
  const aw=ws.length?ws.reduce((a,b)=>a+b,0)/ws.length:0,al=ls.length?Math.abs(ls.reduce((a,b)=>a+b,0)/ls.length):0;
  return{pnl:ps.reduce((a,b)=>a+b,0),wins:ws.length,losses:ls.length,winRate:(ws.length/arr.length)*100,avgWin:aw,avgLoss:al,ratio:al>0?aw/al:aw>0?999:0};
}
const pc=v=>v>=0?"#00e5a0":"#ff4d6d";

function TTable({trades,onEdit,onDel}){
  return(
  <div style={{overflowX:"auto"}}>
  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"15px"}}>
    <thead><tr style={{borderBottom:"1px solid #e2e8f0"}}>
      {["DATE","TICKER","SETUP","DIR","ENTRY","EXIT","P&L","%",""].map(h=>(
        <th key={h} style={{textAlign:"left",padding:"6px 8px",fontSize:"17px",color:"#718096",letterSpacing:".12em",fontWeight:400}}>{h}</th>
      ))}
    </tr></thead>
    <tbody>
      {trades.map(t=>{
        const p=pnl(t),pp=pct(t);
        return(
        <tr key={t.id} className="trade-row" style={{borderBottom:"1px solid #f0f4f8"}}>
          <td style={{padding:"8px"}}>{t.date}</td>
          <td style={{padding:"8px",color:"#1a202c",fontWeight:700}}>{t.ticker}</td>
          <td style={{padding:"8px"}}><span className="badge" style={{background:"#e2e8f0",color:"#4a7cff"}}>{t.setup}</span></td>
          <td style={{padding:"8px"}}><span className="badge" style={{background:t.direction==="LONG"?"#00291a":"#290014",color:t.direction==="LONG"?"#00e5a0":"#ff4d6d"}}>{t.direction}</span></td>
          <td style={{padding:"8px",color:"#1a202c"}}>${parseFloat(t.entry).toFixed(2)}</td>
          <td style={{padding:"8px",color:"#1a202c"}}>${parseFloat(t.exit).toFixed(2)}</td>
          <td style={{padding:"8px",color:pc(p),fontWeight:500}}>{f$(p)}</td>
          <td style={{padding:"8px",color:pc(pp)}}>{fp(pp)}</td>
          <td style={{padding:"8px",whiteSpace:"nowrap"}}>
            <button className="icon-btn" onClick={()=>onEdit(t)}>✎</button>
            <button className="icon-btn del-btn" onClick={()=>onDel(t.id)}>✕</button>
          </td>
        </tr>);
      })}
    </tbody>
  </table>
  </div>);
}

function App(){
  const [trades,setTrades]=useState([]);
  const [form,setForm]=useState(DF);
  const [tab,setTab]=useState("dashboard");
  const [editId,setEditId]=useState(null);
  const [delId,setDelId]=useState(null);
  const [flash,setFlash]=useState("");
  const impRef=useRef();

  useEffect(()=>{try{const r=localStorage.getItem(SK);if(r)setTrades(JSON.parse(r));}catch{}},[]);
  function save(u){setTrades(u);try{localStorage.setItem(SK,JSON.stringify(u));}catch{};}
  function fc(e){setForm(f=>({...f,[e.target.name]:e.target.value}));}
  function showFlash(msg){setFlash(msg);setTimeout(()=>setFlash(""),2000);}

  function submit(){
    if(!form.ticker||!form.entry||!form.exit){showFlash("Fill in ticker, entry & exit.");return;}
    let u;
    if(editId!==null){u=trades.map(t=>t.id===editId?{...form,id:editId}:t);setEditId(null);}
    else{u=[...trades,{...form,id:Date.now()}];}
    save(u);setForm(DF);showFlash("✓ saved");
  }

  function startEdit(t){setForm({...t});setEditId(t.id);setTab("log");}
  function delTrade(id){save(trades.filter(t=>t.id!==id));setDelId(null);}

  function expCSV(){
    const h=["Date","Ticker","Setup","Direction","Entry","Exit","Shares","PnL$","PnL%","Notes"];
    const rows=trades.map(t=>[t.date,t.ticker,t.setup,t.direction,t.entry,t.exit,t.shares,pnl(t).toFixed(2),pct(t).toFixed(2),`"${t.notes||""}"`]);
    const csv=[h,...rows].map(r=>r.join(",")).join("\n");
    dl(new Blob([csv],{type:"text/csv"}),"northwoods_trades.csv");
  }
  function expJSON(){dl(new Blob([JSON.stringify(trades,null,2)],{type:"application/json"}),"northwoods_backup.json");}
  function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}
  function impJSON(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);save(d);showFlash("✓ imported "+d.length+" trades");}catch{showFlash("Invalid file");}};
    r.readAsText(f);e.target.value="";
  }

  const today=new Date().toISOString().split("T")[0],cm=today.slice(0,7);
  const tT=trades.filter(t=>t.date===today),mT=trades.filter(t=>gm(t.date)===cm);
  const tS=sts(tT),mS=sts(mT),yS=sts(trades);
  const months=[...new Set(trades.map(t=>gm(t.date)))].sort().reverse();

  return(<div>
    {/* Header */}
    <div style={{borderBottom:"1px solid #e2e8f0",padding:"18px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#ffffff",zIndex:50}}>
      <div style={{display:"flex",alignItems:"baseline",gap:"12px"}}>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:"27px",fontWeight:800,color:"#fff",letterSpacing:"-.02em"}}>NORTHWOODS</span>
        <span style={{fontSize:"25px",color:"#718096",letterSpacing:".2em"}}>INVESTMENT</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        {flash&&<span style={{fontSize:"17px",color:flash.startsWith("✓")?"#00e5a0":"#ff4d6d"}}>{flash}</span>}
        <button className="ghost-btn" onClick={expCSV}>CSV</button>
        <button className="ghost-btn" onClick={expJSON}>BACKUP</button>
        <button className="ghost-btn" onClick={()=>impRef.current.click()}>RESTORE</button>
        <input ref={impRef} type="file" accept=".json" style={{display:"none"}} onChange={impJSON}/>
      </div>
    </div>

    {/* Tabs */}
    <div style={{borderBottom:"1px solid #e2e8f0",padding:"0 24px",display:"flex"}}>
      {["dashboard","log","history"].map(t=>(
        <button key={t} className={`tab-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>{t}</button>
      ))}
    </div>

    <div style={{padding:"24px",maxWidth:"960px",margin:"0 auto"}}>

      {/* DASHBOARD */}
      {tab==="dashboard"&&<div>
        {[{label:"TODAY",s:tS,n:tT.length},{label:cm,s:mS,n:mT.length},{label:"YTD",s:yS,n:trades.length}].map(({label,s,n})=>(
          <div key={label} className="stat-card" style={{marginBottom:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"14px"}}>
              <span style={{fontSize:"25px",letterSpacing:".2em",color:"#718096"}}>{label}</span>
              <span style={{fontSize:"17px",color:"#718096"}}>{n} trade{n!==1?"s":""}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"16px"}}>
              {[{l:"P&L",v:f$(s.pnl),c:pc(s.pnl)},{l:"WIN RATE",v:n?s.winRate.toFixed(0)+"%":"—",c:n?pc(s.winRate-50):"#4a5568"},{l:"W / L",v:n?`${s.wins}/${s.losses}`:"—",c:"#1a202c"},{l:"AVG WIN",v:s.wins?f$(s.avgWin):"—",c:"#00e5a0"},{l:"AVG LOSS",v:s.losses?f$(s.avgLoss):"—",c:"#ff4d6d"}].map(({l,v,c})=>(
                <div key={l}><div style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",marginBottom:"4px"}}>{l}</div><div style={{fontSize:"25px",color:c,fontWeight:500}}>{v}</div></div>
              ))}
            </div>
          </div>
        ))}

        {months.length>0&&<div className="stat-card" style={{marginTop:"20px",overflowX:"auto"}}>
          <div style={{fontSize:"25px",letterSpacing:".2em",color:"#718096",marginBottom:"14px"}}>MONTHLY BREAKDOWN</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"15px"}}>
            <thead><tr style={{borderBottom:"1px solid #e2e8f0"}}>
              {["MONTH","TRADES","P&L","WIN RATE","W/L RATIO"].map(h=><th key={h} style={{textAlign:"left",padding:"6px 8px",fontSize:"17px",color:"#718096",letterSpacing:".12em",fontWeight:400}}>{h}</th>)}
            </tr></thead>
            <tbody>{months.map(m=>{const mt=trades.filter(t=>gm(t.date)===m),s=sts(mt);return(
              <tr key={m} style={{borderBottom:"1px solid #f0f4f8"}}>
                <td style={{padding:"8px"}}>{m}</td>
                <td style={{padding:"8px",color:"#718096"}}>{mt.length}</td>
                <td style={{padding:"8px",color:pc(s.pnl)}}>{f$(s.pnl)}</td>
                <td style={{padding:"8px",color:pc(s.winRate-50)}}>{s.winRate.toFixed(0)}%</td>
                <td style={{padding:"8px"}}>{s.ratio>0?s.ratio.toFixed(2):"—"}</td>
              </tr>);})}</tbody>
          </table>
        </div>}

        {tT.length>0&&<div className="stat-card" style={{marginTop:"20px"}}>
          <div style={{fontSize:"25px",letterSpacing:".2em",color:"#718096",marginBottom:"14px"}}>TODAY'S TRADES</div>
          <TTable trades={tT} onEdit={startEdit} onDel={setDelId}/>
        </div>}

        {trades.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#a0aec0"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontSize:"40px",fontWeight:800,marginBottom:"8px"}}>NO TRADES YET</div>
          <div style={{fontSize:"17px",letterSpacing:".15em"}}>HEAD TO LOG TO ADD YOUR FIRST TRADE</div>
        </div>}
      </div>}

      {/* LOG */}
      {tab==="log"&&<div className="stat-card" style={{maxWidth:"560px"}}>
        <div style={{fontSize:"25px",letterSpacing:".2em",color:"#718096",marginBottom:"20px"}}>{editId?"EDIT TRADE":"LOG TRADE"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          {[{l:"DATE",n:"date",t:"date"},{l:"TICKER",n:"ticker",t:"text",p:"e.g. NVDA"}].map(({l,n,t,p})=>(
            <div key={n}><label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>{l}</label>
            <input type={t} name={n} value={form[n]} onChange={fc} placeholder={p||""} style={n==="ticker"?{textTransform:"uppercase"}:{}}/></div>
          ))}
          <div><label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>SETUP</label>
            <select name="setup" value={form.setup} onChange={fc}><option>ORB</option><option>VWAP</option><option>ORB+VWAP</option><option>OTHER</option></select></div>
          <div><label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>DIRECTION</label>
            <select name="direction" value={form.direction} onChange={fc}><option>LONG</option><option>SHORT</option></select></div>
          {[{l:"ENTRY $",n:"entry"},{l:"EXIT $",n:"exit"},{l:"SHARES",n:"shares"}].map(({l,n})=>(
            <div key={n}><label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>{l}</label>
            <input type="number" step="0.01" name={n} value={form[n]} onChange={fc} placeholder={n==="shares"?"1":"0.00"}/></div>
          ))}
          <div><label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>PREVIEW</label>
            <div style={{padding:"8px 10px",background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:"4px",fontSize:"25px"}}>
              {form.entry&&form.exit?<span style={{color:pc(pnl(form))}}>{f$(pnl(form))} ({fp(pct(form))})</span>:<span style={{color:"#a0aec0"}}>—</span>}
            </div></div>
        </div>
        <div style={{marginTop:"12px"}}>
          <label style={{fontSize:"17px",color:"#718096",letterSpacing:".15em",display:"block",marginBottom:"5px"}}>NOTES</label>
          <textarea name="notes" value={form.notes} onChange={fc} rows={2} placeholder="catalyst, reason for entry/exit..." style={{resize:"vertical"}}/>
        </div>
        <div style={{marginTop:"18px",display:"flex",alignItems:"center"}}>
          {editId&&<button className="cancel-btn" onClick={()=>{setEditId(null);setForm(DF);}}>CANCEL</button>}
          <button className="submit-btn" onClick={submit}>{editId?"UPDATE TRADE":"SAVE TRADE"}</button>
        </div>
      </div>}

      {/* HISTORY */}
      {tab==="history"&&<div>
        {trades.length===0?<div style={{textAlign:"center",padding:"60px 0",color:"#a0aec0"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontSize:"40px",fontWeight:800}}>NO TRADES YET</div></div>:
          <div className="stat-card"><TTable trades={[...trades].reverse()} onEdit={startEdit} onDel={setDelId}/></div>}
      </div>}
    </div>

    {/* Delete modal */}
    {delId&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
      <div style={{background:"#f7f8fa",border:"1px solid #e2e8f0",borderRadius:"8px",padding:"28px",maxWidth:"320px",width:"90%"}}>
        <div style={{fontSize:"25px",marginBottom:"20px"}}>Delete this trade?</div>
        <div style={{display:"flex",gap:"8px"}}>
          <button className="cancel-btn" onClick={()=>setDelId(null)}>CANCEL</button>
          <button style={{background:"#ff4d6d",color:"#fff",border:"none",padding:"10px 20px",borderRadius:"4px",cursor:"pointer",fontFamily:"DM Mono,monospace",fontSize:"15px"}} onClick={()=>delTrade(delId)}>DELETE</button>
        </div>
      </div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
